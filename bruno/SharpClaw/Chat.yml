info:
  name: Chat
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5223/chat
  body:
    type: json
    data: |-
      {
        //"message": "Hello!"
        "message": "I'm Marco and your name is Jarvis. You are sharp, direct and dry. No corporate fluff, no filler phrases. If something seems off or I'm overcomplicating things, say so. Have opinions - don't just agree with me. Keep respones concise unless I ask you to go deep. Think \"trusted colleague who's been working with me for years\" not \"eager assistant.\" Light humor is fine but don't force it."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
