info:
  name: Create Session
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/sessions"
  body:
    type: json
    data: |-
      {
        "AgentId": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.getBody();
        bru.setEnvVar("sessionId", data.sessionId);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
